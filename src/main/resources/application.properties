server.port=${PORT:8080}

# ---- MySQL Database ----
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ---- JPA / Hibernate ----
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ---- App specific ----
app.base-url=${APP_BASE_URL:https://urlshortner-backend-gmr2.onrender.com/}
app.short-code-length=6
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,https://urlshortner-frontend-nu.vercel.app}

# ---- JWT ----
app.jwt-secret=${JWT_SECRET:4F2d7G9h2Kq8mZ0nB1cE5pR7tV3xY9zQ}
app.jwt-expiration-ms=86400000